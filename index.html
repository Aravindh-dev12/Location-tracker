<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar Maintenance Tracker - Login</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f59e0b">
    <link rel="apple-touch-icon" href="assets/img/icon-192.png">
    <style>
        :root {
            --primary: #f59e0b; /* Solar Yellow */
            --primary-dark: #d97706;
            --secondary: #1f2937; /* Dark Gray */
            --bg: #ffffff;
            --text: #111827;
            --text-light: #6b7280;
            --error: #ef4444;
            --success: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f9fafb;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 420px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            overflow: hidden;
            border: 1px solid #e5e7eb;
        }
        
        .header {
            background: white;
            padding: 40px 20px 20px;
            text-align: center;
            border-bottom: 1px solid #f3f4f6;
        }
        
        .header h1 {
            font-size: 24px;
            font-weight: 800;
            color: var(--secondary);
            margin-bottom: 4px;
            letter-spacing: -0.025em;
        }
        
        .header p {
            font-size: 14px;
            color: var(--text-light);
            font-weight: 500;
        }
        
        .icon {
            font-size: 48px;
            margin-bottom: 16px;
            display: inline-block;
        }
        
        .form-group {
            padding: 30px 32px 40px;
        }
        
        .form-control {
            margin-bottom: 20px;
        }
        
        .form-control label {
            display: block;
            margin-bottom: 8px;
            color: var(--secondary);
            font-weight: 600;
            font-size: 14px;
        }
        
        .form-control input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.2s;
            background: #ffffff;
        }
        
        .form-control input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.1);
        }
        
        .login-btn {
            width: 100%;
            padding: 14px;
            background-color: var(--secondary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }
        
        .login-btn:hover {
            background-color: #374151;
            transform: translateY(-1px);
        }
        
        .login-btn:active {
            transform: translateY(0);
        }
        
        .error-message {
            background: #fef2f2;
            color: var(--error);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 24px;
            border: 1px solid #fee2e2;
            display: none;
            font-size: 14px;
            font-weight: 500;
            text-align: center;
        }
        
        .demo-creds {
            margin-top: 32px;
            background: #f9fafb;
            padding: 20px;
            border-radius: 8px;
            font-size: 13px;
            color: var(--text-light);
            border: 1px solid #f3f4f6;
        }
        
        .demo-creds h4 {
            margin-bottom: 12px;
            color: var(--secondary);
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        .demo-cred-row {
            margin: 8px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .demo-cred-row strong {
            color: var(--secondary);
        }
        
        .demo-cred-row code {
            background: #ffffff;
            padding: 4px 8px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            color: var(--primary-dark);
            border: 1px solid #e5e7eb;
            font-weight: 600;
        }
        
        .loading {
            display: none;
            text-align: center;
        }
        
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid #ffffff;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @media (max-width: 600px) {
            .container {
                margin: 20px;
            }
            
            .header {
                padding: 30px 20px;
            }
            
            .header h1 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="icon">☀️</div>
            <h1>Solar Maintenance</h1>
            <p>Tracking & Location System</p>
        </div>
        
        <div class="form-group">
            <div class="error-message" id="errorMessage"></div>
            
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-control">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="admin@solar.com">
                </div>
                
                <div class="form-control">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Password">
                </div>
                
                <button type="submit" class="login-btn" id="loginBtn">
                    <span id="btnText">LOGIN</span>
                    <span id="btnLoader" class="loading"><div class="spinner"></div></span>
                </button>
            </form>
            
        </div>
    </div>
    
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        async function handleLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMessage');
            const loginBtn = document.getElementById('loginBtn');
            const btnText = document.getElementById('btnText');
            const btnLoader = document.getElementById('btnLoader');
            
            // Clear previous errors
            errorMsg.style.display = 'none';
            
            // Show loading
            loginBtn.disabled = true;
            btnText.style.display = 'none';
            btnLoader.style.display = 'block';
            
            try {
                const response = await fetch('api/auth_login.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // Store user info
                    localStorage.setItem('user', JSON.stringify(data.user));
                    
                    // Redirect based on role
                    if (data.user.role === 'admin') {
                        window.location.href = 'admin/dashboard.html';
                    } else {
                        window.location.href = 'employee/dashboard.html';
                    }
                } else {
                    showError(data.error || 'Invalid credentials');
                    loginBtn.disabled = false;
                    btnText.style.display = 'block';
                    btnLoader.style.display = 'none';
                }
            } catch (error) {
                showError('Error connecting to server');
                loginBtn.disabled = false;
                btnText.style.display = 'block';
                btnLoader.style.display = 'none';
            }
        }
        
        function showError(message) {
            const errorMsg = document.getElementById('errorMessage');
            errorMsg.textContent = message;
            errorMsg.style.display = 'block';
        }
    </script>
</body>
</html>
